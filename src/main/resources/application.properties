spring.application.name=quan_ly_thuc_tap

## Cau hinh ket noi
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

## Cau hinh sql
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
service.jwt.secret-key=${SERVICE_JWT_SECRET_KEY}
service.jwt.expiration=${SERVICE_JWT_EXPIRATION}
service.jwt.refresh-expiration=${SERVICE_JWT_REFRESH_EXPIRATION}